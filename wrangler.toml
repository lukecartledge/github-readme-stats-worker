name = "github-readme-stats"
main = "src/worker.js"
compatibility_date = "2026-04-06"
compatibility_flags = ["nodejs_compat"]

# Custom domain: stats.lukecartledge.com
# Managed via Workers Custom Domains (not routes) — configured in Cloudflare dashboard

# Environment variables (non-secret)
[vars]
CACHE_MAX_AGE = "1800"

# GitHub PATs are secrets — set via: wrangler secret put GH_PAT_1
# Support multiple tokens for rate-limit rotation:
#   wrangler secret put GH_PAT_1
#   wrangler secret put GH_PAT_2

# Analytics Engine for request logging
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "github_readme_stats"

# KV namespace for cross-datacenter caching
# Create via: wrangler kv namespace create SVG_CACHE
# Then paste the id below and uncomment
# [[kv_namespaces]]
# binding = "SVG_CACHE"
# id = ""
